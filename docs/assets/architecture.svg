<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="Playwright POM architecture">
  <rect width="920" height="420" fill="#0f172a"/>
  <text x="32" y="40" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Playwright UI Suite — Architecture (POM)</text>
  <text x="32" y="64" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="13">tests describe journeys · page objects own selectors · browser drives SauceDemo</text>

  <!-- Tests -->
  <rect x="40" y="100" width="190" height="220" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="135" y="130" text-anchor="middle" fill="#38bdf8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">tests/</text>
  <text x="56" y="160" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">test_login</text>
  <text x="56" y="182" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">test_cart</text>
  <text x="56" y="204" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">test_checkout</text>
  <text x="56" y="226" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">test_negative</text>
  <text x="56" y="260" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">9 cases · happy + negative</text>
  <text x="56" y="280" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">intent-only (no CSS here)</text>

  <!-- Pages -->
  <rect x="280" y="100" width="200" height="220" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="380" y="130" text-anchor="middle" fill="#a78bfa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">pages/ (POM)</text>
  <text x="296" y="160" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">BasePage</text>
  <text x="296" y="182" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">LoginPage</text>
  <text x="296" y="204" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">InventoryPage</text>
  <text x="296" y="226" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">CartPage</text>
  <text x="296" y="248" fill="#e2e8f0" font-family="Consolas, monospace" font-size="12">CheckoutPage</text>
  <text x="296" y="290" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">selectors + actions</text>

  <!-- Playwright -->
  <rect x="530" y="130" width="160" height="160" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="610" y="165" text-anchor="middle" fill="#34d399" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Playwright</text>
  <text x="548" y="198" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="12">Chromium</text>
  <text x="548" y="220" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="12">auto-wait · expect</text>
  <text x="548" y="242" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">trace on failure</text>
  <text x="548" y="264" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">headless in CI</text>

  <!-- App -->
  <rect x="740" y="130" width="140" height="160" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="810" y="170" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">SauceDemo</text>
  <text x="756" y="205" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="12">login → cart</text>
  <text x="756" y="227" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="12">checkout</text>
  <text x="756" y="260" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">public demo shop</text>

  <path d="M230 210 H275" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M480 210 H525" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M690 210 H735" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="32" y="360" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="12">utils/test_data.py · credentials &amp; products · pytest-playwright page fixture · GitHub Actions artifacts</text>
  <text x="32" y="390" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11">M6 portfolio diagram · playwright-pom-saucedemo</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
