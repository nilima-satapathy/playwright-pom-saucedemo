[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_functions = test_*
# M4: capture screenshot + Playwright trace only when a test fails.
# Artifacts land in test-results/ (gitignored). View a trace with:
#   playwright show-trace test-results/.../trace.zip
addopts =
    -v
    --tb=short
    --screenshot=only-on-failure
    --tracing=retain-on-failure
# Browser defaults for pytest-playwright. Override on CLI if needed:
#   pytest --browser chromium --headed
